<!DOCTYPE html>
<html lang="it" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Six Fingers — Generatore Squadre Calcetto</title>
    
    <!-- Fonts -->
    <link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,600,700&f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Surfaces */
            --color-bg:           #0f1a0f;   /* verde scuro quasi nero */
            --color-surface:      #1a2e1a;
            --color-surface-2:    #1f361f;
            --color-border:       rgba(255,255,255,0.10);

            /* Text */
            --color-text:         #e8f5e8;
            --color-text-muted:   #8fb08f;
            --color-text-faint:   #5a7a5a;

            /* Accent Verde */
            --color-primary:      #4caf50;
            --color-primary-hover: #43a047;
            --color-primary-active: #388e3c;

            /* Squadra Falchi */
            --color-falchi:       #2196f3;   /* blu */
            --color-falchi-bg:    rgba(33, 150, 243, 0.12);

            /* Squadra Aquile */
            --color-aquile:       #ff9800;   /* arancione */
            --color-aquile-bg:    rgba(255, 152, 0, 0.12);

            /* Feedback */
            --color-error:        #ef5350;
            --color-success:      #66bb6a;

            /* Fonts */
            --font-display: 'Clash Display', 'Helvetica Neue', sans-serif;
            --font-body:    'Satoshi', 'Inter', sans-serif;

            /* Typography */
            --text-xs:   clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
            --text-sm:   clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
            --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
            --text-lg:   clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
            --text-xl:   clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);

            /* Spacing */
            --space-1: 0.25rem;  /* 4px */
            --space-2: 0.5rem;   /* 8px */
            --space-3: 0.75rem;  /* 12px */
            --space-4: 1rem;     /* 16px */
            --space-6: 1.5rem;   /* 24px */
            --space-8: 2rem;     /* 32px */
            --space-12: 3rem;    /* 48px */

            /* Radius */
            --radius-sm:   0.375rem;
            --radius-md:   0.5rem;
            --radius-lg:   0.75rem;
            --radius-xl:   1rem;
            --radius-full: 9999px;

            /* Shadows */
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --shadow-primary: 0 10px 15px -3px rgba(76, 175, 80, 0.3);
        }

        [data-theme="light"] {
            --color-bg:           #f1f8f1;
            --color-surface:      #ffffff;
            --color-surface-2:    #f5faf5;
            --color-border:       rgba(0,0,0,0.10);
            --color-text:         #1b2e1b;
            --color-text-muted:   #4a6a4a;
            --color-text-faint:   #8aaa8a;
            --color-primary:      #2e7d32;
            --color-primary-hover: #1b5e20;
            --color-primary-active: #144317;
            --shadow-primary: 0 10px 15px -3px rgba(46, 125, 50, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--color-bg);
            color: var(--color-text);
            line-height: 1.5;
            transition: background-color 0.3s ease, color 0.3s ease;
            min-height: 100vh;
            padding: var(--space-4);
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: var(--space-4) 0 var(--space-12);
        }

        /* Typography */
        h1, h2, h3 {
            font-family: var(--font-display);
            font-weight: 700;
        }

        h2 {
            font-size: var(--text-lg);
            margin-bottom: var(--space-4);
            display: flex;
            align-items: center;
            gap: var(--space-2);
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--space-8);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: var(--space-3);
            font-family: var(--font-display);
            font-size: var(--text-lg);
            font-weight: 700;
            color: var(--color-primary);
        }

        .logo svg {
            width: 32px;
            height: 32px;
            fill: currentColor;
        }

        .theme-toggle {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            color: var(--color-text);
            width: 44px;
            height: 44px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .theme-toggle:hover {
            background: var(--color-surface-2);
            transform: translateY(-2px);
        }

        /* Sections */
        section {
            margin-bottom: var(--space-12);
        }

        .section-subtitle {
            font-size: var(--text-sm);
            color: var(--color-text-muted);
            margin-top: calc(-1 * var(--space-3));
            margin-bottom: var(--space-4);
        }

        /* Players Grid */
        .players-grid {
            display: grid;
            gap: var(--space-4);
            grid-template-columns: repeat(2, 1fr);
        }

        @media (min-width: 768px) {
            .players-grid {
                grid-template-columns: repeat(5, 1fr);
            }
        }

        .player-input-group {
            position: relative;
        }

        .player-input-wrapper {
            display: flex;
            align-items: center;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            padding: var(--space-1);
            transition: all 0.2s ease;
        }

        .player-input-wrapper:focus-within {
            border-color: var(--color-primary);
            box-shadow: 0 0 0 2px var(--color-primary);
            transform: scale(1.01);
        }

        .player-number {
            width: 28px;
            height: 28px;
            background: var(--color-surface-2);
            color: var(--color-text-muted);
            border-radius: var(--radius-full);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: var(--text-xs);
            font-weight: 700;
            margin-left: var(--space-2);
            flex-shrink: 0;
        }

        .player-input {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--color-text);
            padding: var(--space-3) var(--space-4);
            font-family: var(--font-body);
            font-size: var(--text-base);
            outline: none;
        }

        .player-input::placeholder {
            color: var(--color-text-faint);
        }

        .error-message {
            color: var(--color-error);
            font-size: var(--text-xs);
            margin-top: var(--space-1);
            height: 1rem;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .error-message.visible {
            opacity: 1;
        }

        .player-input-wrapper.error {
            border-color: var(--color-error);
        }

        /* Clusters */
        .clusters-list {
            display: grid;
            gap: var(--space-6);
        }

        .cluster-card {
            background: var(--color-surface-2);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            padding: var(--space-4);
            position: relative;
            animation: scaleIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
            border-left: 4px solid var(--color-primary);
        }

        @keyframes scaleIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .cluster-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--space-4);
        }

        .cluster-name-input {
            background: transparent;
            border: none;
            color: var(--color-text);
            font-family: var(--font-display);
            font-size: var(--text-base);
            font-weight: 600;
            outline: none;
            border-bottom: 1px solid transparent;
            width: 100%;
            margin-right: var(--space-4);
        }

        .cluster-name-input:focus {
            border-bottom-color: var(--color-primary);
        }

        .remove-cluster-btn {
            background: transparent;
            border: none;
            color: var(--color-text-muted);
            cursor: pointer;
            padding: var(--space-1);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s;
        }

        .remove-cluster-btn:hover {
            color: var(--color-error);
        }

        .cluster-players-selection {
            display: flex;
            flex-wrap: wrap;
            gap: var(--space-2);
        }

        .player-chip {
            padding: var(--space-2) var(--space-4);
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-full);
            font-size: var(--text-sm);
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }

        .player-chip.selected {
            background: var(--color-primary);
            border-color: var(--color-primary);
            color: white;
        }

        .player-chip.disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .add-cluster-btn {
            background: var(--color-surface);
            border: 1px dashed var(--color-border);
            color: var(--color-text-muted);
            padding: var(--space-4);
            border-radius: var(--radius-lg);
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-2);
            cursor: pointer;
            transition: all 0.2s;
            font-family: var(--font-body);
            font-weight: 600;
            margin-top: var(--space-4);
        }

        .add-cluster-btn:hover {
            border-color: var(--color-primary);
            color: var(--color-primary);
            background: var(--color-surface-2);
        }

        /* Main Action Button */
        .actions {
            display: flex;
            justify-content: center;
            margin-top: var(--space-8);
        }

        .create-teams-btn {
            background: var(--color-primary);
            color: white;
            border: none;
            padding: 0 var(--space-8);
            height: 56px;
            border-radius: var(--radius-full);
            font-family: var(--font-display);
            font-size: var(--text-lg);
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: var(--space-3);
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: var(--shadow-primary);
            width: 100%;
        }

        @media (min-width: 480px) {
            .create-teams-btn {
                width: auto;
            }
        }

        .create-teams-btn:hover:not(:disabled) {
            background: var(--color-primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 12px 20px -5px rgba(76, 175, 80, 0.4);
        }

        .create-teams-btn:active:not(:disabled) {
            transform: scale(0.97);
        }

        .create-teams-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* Results */
        .results-section {
            display: none;
            margin-top: var(--space-12);
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(40px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .teams-container {
            display: grid;
            gap: var(--space-6);
            grid-template-columns: 1fr;
        }

        @media (min-width: 768px) {
            .teams-container {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .team-card {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-xl);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .team-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }

        .team-header {
            padding: var(--space-4) var(--space-6);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .team-falchi .team-header {
            background: var(--color-falchi-bg);
            border-bottom: 2px solid var(--color-falchi);
        }

        .team-aquile .team-header {
            background: var(--color-aquile-bg);
            border-bottom: 2px solid var(--color-aquile);
        }

        .team-name {
            font-family: var(--font-display);
            font-size: var(--text-lg);
            font-weight: 700;
            color: var(--color-text);
            background: transparent;
            border: none;
            outline: none;
        }

        .team-list {
            list-style: none;
            padding: var(--space-4) var(--space-6);
        }

        .player-row {
            display: flex;
            align-items: center;
            gap: var(--space-4);
            padding: var(--space-3) 0;
            border-bottom: 1px solid var(--color-border);
        }

        .player-row:last-child {
            border-bottom: none;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: var(--radius-full);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: var(--text-xs);
            color: white;
            flex-shrink: 0;
        }

        .player-name {
            font-weight: 500;
            font-size: var(--text-base);
        }

        .results-actions {
            display: flex;
            gap: var(--space-4);
            margin-top: var(--space-8);
            justify-content: center;
        }

        .secondary-btn {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            color: var(--color-text);
            padding: 0 var(--space-6);
            height: 48px;
            border-radius: var(--radius-full);
            font-family: var(--font-body);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: var(--space-2);
            cursor: pointer;
            transition: all 0.2s;
        }

        .secondary-btn:hover {
            background: var(--color-surface-2);
            border-color: var(--color-text-muted);
        }

        /* Utilities */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }

        .toast {
            position: fixed;
            bottom: var(--space-8);
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--color-surface-2);
            color: var(--color-text);
            padding: var(--space-3) var(--space-6);
            border-radius: var(--radius-full);
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--color-border);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: var(--space-2);
        }

        .toast.visible {
            transform: translateX(-50%) translateY(0);
        }

        .toast.error {
            border-left: 4px solid var(--color-error);
        }

        .toast.success {
            border-left: 4px solid var(--color-success);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <svg viewBox="0 0 100 100" width="32" height="32" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="50" cy="50" r="48" stroke="currentColor" stroke-width="4"/>
                    <path d="M50 2L35 25H65L50 2Z" fill="currentColor"/>
                    <path d="M20 35L2 50L20 65L35 50L20 35Z" fill="currentColor"/>
                    <path d="M80 35L98 50L80 65L65 50L80 35Z" fill="currentColor"/>
                    <path d="M35 75L50 98L65 75H35Z" fill="currentColor"/>
                    <path d="M35 25L20 35M65 25L80 35M20 65L35 75M80 65L65 75M35 50H65M50 25L50 75" stroke="currentColor" stroke-width="2"/>
                </svg>
                Random Six Fingers
            </div>
            <button class="theme-toggle" id="theme-toggle" aria-label="Cambia tema">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" id="sun-icon">
                    <circle cx="12" cy="12" r="5"></circle>
                    <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>
                </svg>
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" id="moon-icon" style="display:none">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
            </button>
        </header>

        <section id="players-section">
            <h2>👥 Giocatori</h2>
            <div class="players-grid" id="players-grid">
                <!-- Players inputs generated by JS -->
            </div>
        </section>

        <section id="clusters-section">
            <h2>⚡ Cluster di Vincolo</h2>
            <p class="section-subtitle">I giocatori dello stesso cluster saranno divisi in squadre diverse</p>
            <div class="clusters-list" id="clusters-list">
                <!-- Clusters generated by JS -->
            </div>
            <button class="add-cluster-btn" id="add-cluster-btn">
                <span>＋</span> Aggiungi Cluster
            </button>
        </section>

        <div class="actions">
            <button class="create-teams-btn" id="create-teams-btn">
                ⚽ Crea Squadre
            </button>
        </div>

        <section class="results-section" id="results-section">
            <div class="teams-container">
                <div class="team-card team-falchi" id="team-a-card">
                    <div class="team-header">
                        <input type="text" class="team-name" value="Falchi 🦅" spellcheck="false">
                        <span>✏️</span>
                    </div>
                    <ul class="team-list" id="team-a-list">
                        <!-- List of players -->
                    </ul>
                </div>
                <div class="team-card team-aquile" id="team-b-card">
                    <div class="team-header">
                        <input type="text" class="team-name" value="Aquile 🦆" spellcheck="false">
                        <span>✏️</span>
                    </div>
                    <ul class="team-list" id="team-b-list">
                        <!-- List of players -->
                    </ul>
                </div>
            </div>

            <div class="results-actions">
                <button class="secondary-btn" id="reshuffle-btn">
                    🔀 Rimescola
                </button>
                <button class="secondary-btn" id="copy-btn">
                    📋 Copia
                </button>
            </div>
        </section>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        // State Management
        const state = {
            players: Array(10).fill(''),
            clusters: [],
            results: null,
            theme: 'dark'
        };

        // DOM Elements
        const playersGrid = document.getElementById('players-grid');
        const clustersList = document.getElementById('clusters-list');
        const addClusterBtn = document.getElementById('add-cluster-btn');
        const createTeamsBtn = document.getElementById('create-teams-btn');
        const resultsSection = document.getElementById('results-section');
        const teamAList = document.getElementById('team-a-list');
        const teamBList = document.getElementById('team-b-list');
        const themeToggle = document.getElementById('theme-toggle');
        const sunIcon = document.getElementById('sun-icon');
        const moonIcon = document.getElementById('moon-icon');
        const toast = document.getElementById('toast');
        const reshuffleBtn = document.getElementById('reshuffle-btn');
        const copyBtn = document.getElementById('copy-btn');

        // Initialization
        function init() {
            renderPlayers();
            setupEventListeners();
            updateThemeIcons();
        }

        function renderPlayers() {
            playersGrid.innerHTML = '';
            state.players.forEach((name, index) => {
                const group = document.createElement('div');
                group.className = 'player-input-group';
                group.innerHTML = `
                    <div class="player-input-wrapper" id="wrapper-${index}">
                        <span class="player-number">${index + 1}</span>
                        <input type="text" class="player-input" 
                               placeholder="Giocatore ${index + 1}" 
                               value="${name}" 
                               data-index="${index}">
                    </div>
                    <div class="error-message" id="error-${index}"></div>
                `;
                playersGrid.appendChild(group);
            });
        }

        function setupEventListeners() {
            // Player inputs
            playersGrid.addEventListener('input', (e) => {
                if (e.target.classList.contains('player-input')) {
                    const index = parseInt(e.target.dataset.index);
                    state.players[index] = e.target.value.trim();
                    validatePlayer(index);
                    updateClustersUI();
                }
            });

            // Theme toggle
            themeToggle.addEventListener('click', () => {
                state.theme = state.theme === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', state.theme);
                updateThemeIcons();
            });

            // Add Cluster
            addClusterBtn.addEventListener('click', () => {
                const clusterId = Date.now();
                state.clusters.push({
                    id: clusterId,
                    name: `Cluster ${String.fromCharCode(65 + state.clusters.length)}`,
                    members: []
                });
                renderClusters();
            });

            // Create Teams
            createTeamsBtn.addEventListener('click', generateTeams);

            // Reshuffle
            reshuffleBtn.addEventListener('click', generateTeams);

            // Copy
            copyBtn.addEventListener('click', copyResults);
        }

        function updateThemeIcons() {
            if (state.theme === 'dark') {
                sunIcon.style.display = 'block';
                moonIcon.style.display = 'none';
            } else {
                sunIcon.style.display = 'none';
                moonIcon.style.display = 'block';
            }
        }

        function validatePlayer(index) {
            const name = state.players[index];
            const wrapper = document.getElementById(`wrapper-${index}`);
            const error = document.getElementById(`error-${index}`);
            
            if (name === '') {
                // Only show error on submit or if it was previously invalid
                return true;
            }

            // Check for duplicates
            const duplicates = state.players.filter((n, i) => n !== '' && n.toLowerCase() === name.toLowerCase() && i !== index);
            if (duplicates.length > 0) {
                wrapper.classList.add('error');
                error.textContent = `Il nome '${name}' è già presente`;
                error.classList.add('visible');
                return false;
            }

            wrapper.classList.remove('error');
            error.classList.remove('visible');
            return true;
        }

        function renderClusters() {
            clustersList.innerHTML = '';
            state.clusters.forEach(cluster => {
                const card = document.createElement('div');
                card.className = 'cluster-card';
                card.innerHTML = `
                    <div class="cluster-header">
                        <input type="text" class="cluster-name-input" value="${cluster.name}" data-id="${cluster.id}">
                        <button class="remove-cluster-btn" data-id="${cluster.id}">
                            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path d="M18 6L6 18M6 6l12 12"></path>
                            </svg>
                        </button>
                    </div>
                    <div class="cluster-players-selection">
                        ${state.players.map((name, index) => {
                            if (!name) return '';
                            const isSelected = cluster.members.includes(name);
                            const isTakenByOther = state.clusters.some(c => c.id !== cluster.id && c.members.includes(name));
                            return `
                                <div class="player-chip ${isSelected ? 'selected' : ''} ${isTakenByOther ? 'disabled' : ''}" 
                                     data-cluster-id="${cluster.id}" 
                                     data-player-name="${name}">
                                    ${name}
                                </div>
                            `;
                        }).join('')}
                    </div>
                `;
                clustersList.appendChild(card);
            });

            // Add events for dynamic elements
            clustersList.querySelectorAll('.remove-cluster-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const id = parseInt(btn.dataset.id);
                    state.clusters = state.clusters.filter(c => c.id !== id);
                    renderClusters();
                });
            });

            clustersList.querySelectorAll('.cluster-name-input').forEach(input => {
                input.addEventListener('change', (e) => {
                    const id = parseInt(input.dataset.id);
                    const cluster = state.clusters.find(c => c.id === id);
                    if (cluster) cluster.name = e.target.value;
                });
            });

            clustersList.querySelectorAll('.player-chip:not(.disabled)').forEach(chip => {
                chip.addEventListener('click', () => {
                    const clusterId = parseInt(chip.dataset.clusterId);
                    const playerName = chip.dataset.playerName;
                    const cluster = state.clusters.find(c => c.id === clusterId);
                    
                    if (cluster.members.includes(playerName)) {
                        cluster.members = cluster.members.filter(m => m !== playerName);
                    } else {
                        cluster.members.push(playerName);
                    }
                    renderClusters();
                });
            });
        }

        function updateClustersUI() {
            // Re-render chips when player names change
            renderClusters();
        }

        function showToast(message, type = 'info') {
            toast.textContent = message;
            toast.className = `toast visible ${type}`;
            setTimeout(() => {
                toast.classList.remove('visible');
            }, 3000);
        }

        // Algorithm
        function generateTeams() {
            // 1. Validation
            let valid = true;
            let firstEmptyIndex = -1;

            state.players.forEach((name, index) => {
                const wrapper = document.getElementById(`wrapper-${index}`);
                const error = document.getElementById(`error-${index}`);
                if (!name) {
                    wrapper.classList.add('error');
                    error.textContent = 'Inserisci un nome';
                    error.classList.add('visible');
                    valid = false;
                    if (firstEmptyIndex === -1) firstEmptyIndex = index;
                } else if (!validatePlayer(index)) {
                    valid = false;
                }
            });

            if (!valid) {
                if (firstEmptyIndex !== -1) {
                    showToast('Inserisci tutti e 10 i nomi prima di continuare', 'error');
                } else {
                    showToast('Correggi gli errori nei nomi dei giocatori', 'error');
                }
                return;
            }

            // Cluster validation
            for (const cluster of state.clusters) {
                if (cluster.members.length < 2) {
                    showToast('Ogni cluster deve avere almeno 2 giocatori', 'error');
                    return;
                }
                if (cluster.members.length > 5) {
                    showToast('Impossibile rispettare tutti i vincoli. Riduci la dimensione dei cluster.', 'error');
                    return;
                }
            }

            // 2. Algorithm
            const shuffledPlayers = [...state.players].sort(() => Math.random() - 0.5);
            let teamA = [];
            let teamB = [];

            // Helper to get player's cluster
            const getPlayerCluster = (name) => state.clusters.find(c => c.members.includes(name));

            try {
                // First pass: Handle cluster players
                // Sort cluster players so we handle larger clusters first or just handle them all
                const clusterPlayers = shuffledPlayers.filter(p => getPlayerCluster(p));
                const normalPlayers = shuffledPlayers.filter(p => !getPlayerCluster(p));

                for (const player of clusterPlayers) {
                    const cluster = getPlayerCluster(player);
                    const membersInA = cluster.members.filter(m => teamA.includes(m));
                    const membersInB = cluster.members.filter(m => teamB.includes(m));

                    if (membersInA.length > 0) {
                        if (teamB.length < 5) teamB.push(player);
                        else throw new Error('Impossibile rispettare tutti i vincoli. Riduci la dimensione dei cluster.');
                    } else if (membersInB.length > 0) {
                        if (teamA.length < 5) teamA.push(player);
                        else throw new Error('Impossibile rispettare tutti i vincoli. Riduci la dimensione dei cluster.');
                    } else {
                        // Assign to team with less members or random
                        if (teamA.length < teamB.length && teamA.length < 5) teamA.push(player);
                        else if (teamB.length < teamA.length && teamB.length < 5) teamB.push(player);
                        else if (teamA.length < 5) teamA.push(player);
                        else if (teamB.length < 5) teamB.push(player);
                        else throw new Error('Impossibile rispettare tutti i vincoli. Riduci la dimensione dei cluster.');
                    }
                }

                // Second pass: Handle normal players
                for (const player of normalPlayers) {
                    if (teamA.length < 5) teamA.push(player);
                    else teamB.push(player);
                }

                if (teamA.length !== 5 || teamB.length !== 5) {
                     throw new Error('Impossibile rispettare tutti i vincoli. Riduci la dimensione dei cluster.');
                }

                renderResults(teamA, teamB);
            } catch (err) {
                showToast(err.message, 'error');
            }
        }

        function renderResults(teamA, teamB) {
            state.results = { teamA, teamB };
            
            teamAList.innerHTML = '';
            teamBList.innerHTML = '';

            teamA.forEach(name => teamAList.appendChild(createPlayerRow(name, 'falchi')));
            teamB.forEach(name => teamBList.appendChild(createPlayerRow(name, 'aquile')));

            resultsSection.style.display = 'block';
            
            // Wait for display:block to take effect for animation and scroll
            requestAnimationFrame(() => {
                resultsSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
            });
        }

        function createPlayerRow(name, teamType) {
            const li = document.createElement('li');
            li.className = 'player-row';
            
            const initials = name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
            const hue = hashStringToHue(name);
            
            li.innerHTML = `
                <div class="avatar" style="background: hsl(${hue}, 60%, 45%)">
                    ${initials}
                </div>
                <span class="player-name">${name}</span>
            `;
            return li;
        }

        function hashStringToHue(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = str.charCodeAt(i) + ((hash << 5) - hash);
            }
            return Math.abs(hash) % 360;
        }

        function copyResults() {
            if (!state.results) return;

            const teamAName = document.querySelector('.team-falchi .team-name').value;
            const teamBName = document.querySelector('.team-aquile .team-name').value;
            const date = new Date().toLocaleDateString('it-IT');

            const text = `⚽ RANDOM SIX FINGERS — Squadre del ${date}\n\n` +
                         `${teamAName.toUpperCase()}\n` +
                         state.results.teamA.map((n, i) => `${i + 1}. ${n}`).join('\n') +
                         `\n\n${teamBName.toUpperCase()}\n` +
                         state.results.teamB.map((n, i) => `${i + 1}. ${n}`).join('\n');

            navigator.clipboard.writeText(text).then(() => {
                const originalText = copyBtn.innerHTML;
                copyBtn.innerHTML = '✅ Copiato!';
                setTimeout(() => copyBtn.innerHTML = originalText, 2000);
                showToast('Risultato copiato negli appunti', 'success');
            });
        }

        // Run
        init();
    </script>
</body>
</html>
